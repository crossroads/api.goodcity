version: 2.1

# ENV VARS required
# AZURE_SP           - service principal given the Contributor role on the Azure Container Registry
# AZURE_SP_PASSWORD  - service principal password
# AZURE_SP_TENANT    - tenant of servie principal
# AZURE_SUBSCRIPTION - name of Azure subscription with the container registry
# AZURE_ACR_REGISTRY - name of Azure Container Registry
# CC_TEST_REPORTER_ID   - for reporting code climate statistics
# GITHUB_TOKEN - token for accessing private repos. See https://github.com/settings/tokens

aliases:
  - &restore-bundler-cache
      key: v1-bundle-{{ checksum "Gemfile.lock" }}
  - &save-bundler-cache
      key: v1-bundle-{{ checksum "Gemfile.lock" }}
      paths:
        - vendor/bundle

orbs:
  azure-cli: circleci/azure-cli@1.2.2
  browser-tools: circleci/browser-tools@1.5.3

defaults: &defaults
  docker:
    - image: cimg/ruby:3.4.9
  working_directory: ~/api.goodcity

jobs:
  checkout_code:
    <<: *defaults
    steps:
      - checkout
      - save_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - ~/api.goodcity

  bundle_dependencies:
    <<: *defaults
    steps:
      - run: mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run: gem install bundler:2.6.9
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      - restore_cache: *restore-bundler-cache
      - run: bundle config set --local deployment 'true' && (bundle check || bundle install --jobs=2 --retry=3)
      - save_cache: *save-bundler-cache

  test:
    <<: *defaults
    docker:
      - image: cimg/ruby:3.4.9-browsers
      - image: cimg/redis:6.0
      - image: cimg/postgres:14.20
        environment:
          POSTGRES_USER: postgres
          POSTGRES_DB: goodcity_server_test
    parallelism: 3
    environment:
      RAILS_ENV: test
      # Parallel containers share one Postgres service — each node MUST use its own database or
      # transactional specs race on delete_all / factories (flaky appointment_slots, orders, etc.).
      # DATABASE_URL is set in each DB-using step via CIRCLE_NODE_INDEX.
    steps:
      - run: sudo apt update && sudo apt -y upgrade libu2f-udev
      - browser-tools/install-browser-tools
      - run:
          name: Install PostgreSQL Client (required to run migrations)
          command: |
            sudo apt update
            sudo apt-get install -y postgresql-client
      - attach_workspace:
          at: ~/api.goodcity/tmp
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      - restore_cache: *restore-bundler-cache
      - run: gem install bundler:2.6.9 && bundle config set --local deployment 'true' && (bundle check || bundle install --jobs=2 --retry=3)
      - run:
          name: Wait for DB and Redis containers to start
          command: dockerize -wait tcp://localhost:5432 -wait tcp://localhost:6379 -timeout 1m
      - run:
          name: Setup test database (per parallel container)
          command: |
            export DATABASE_URL="postgres://postgres@localhost:5432/goodcity_server_test_${CIRCLE_NODE_INDEX:-0}"
            bundle exec rails db:create db:migrate
      - run:
          name: Cucumber tests
          command: |
            export DATABASE_URL="postgres://postgres@localhost:5432/goodcity_server_test_${CIRCLE_NODE_INDEX:-0}"
            bundle exec cucumber
      - run:
          name: Recreate test database after Cucumber
          command: |
            export DATABASE_URL="postgres://postgres@localhost:5432/goodcity_server_test_${CIRCLE_NODE_INDEX:-0}"
            bundle exec rails db:drop db:create db:schema:load
      - run:
          name: Rspec tests
          command: |
            export DATABASE_URL="postgres://postgres@localhost:5432/goodcity_server_test_${CIRCLE_NODE_INDEX:-0}"
            mkdir -p ~/rspec
            bundle exec rspec --format progress \
                              --format RspecJunitFormatter \
                              --out ~/rspec/rspec.xml \
                              $(circleci tests glob "spec/**/*_spec.rb" | circleci tests split --split-by=timings)
      - store_test_results:
          path: ~/rspec

  audit:
    <<: *defaults
    steps:
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      - run: gem install bundler-audit
      # - run: bundle-audit -v --update

  deploy:
    <<: *defaults
    steps:
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      - restore_cache: *restore-bundler-cache
      - run: gem install bundler:2.6.9 && bundle config set --local deployment 'true' && (bundle check || bundle install --jobs=2 --retry=3)
      - run: |
          STAGE=$(if [ "$CIRCLE_BRANCH" == "live" ]; then echo production; else echo staging; fi)
          bundle exec cap ${STAGE} deploy

  build-and-deploy-docker-image:
    executor: azure-cli/default
    working_directory: ~/api.goodcity
    steps:
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      - azure-cli/install
      - azure-cli/login-with-service-principal
      - run: az account set --subscription $AZURE_SUBSCRIPTION
      - run: az acr build --build-arg GITHUB_TOKEN --registry $AZURE_ACR_REGISTRY --image api.goodcity:$CIRCLE_BRANCH .

workflows:
  version: 2
  build-test-audit-and-deploy:
    jobs:
      - checkout_code
      - bundle_dependencies:
          requires:
            - checkout_code
      - test:
          requires:
            - bundle_dependencies
      - audit:
          requires:
            - checkout_code
      - deploy:
          requires:
            - test
            - audit
          filters:
            branches:
              only: /^(master|live)$/
      # - build-and-deploy-docker-image:
      #     requires:
      #       - test
      #       - audit
      #     filters:
      #       branches:
      #         only: /^(master)$/
